name: CodeQL — Security Analysis

on:
  push:
    branches: [main]
    paths:
      - 'OneDrive - DataEX/Documents/Projetos Pessoais/ZapIa/**'
  pull_request:
    branches: [main]
    paths:
      - 'OneDrive - DataEX/Documents/Projetos Pessoais/ZapIa/**'
  schedule:
    # Roda toda segunda-feira às 08:00 UTC independente de push
    - cron: '0 8 * * 1'

jobs:
  analyze:
    name: CodeQL Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript
          source-root: "OneDrive - DataEX/Documents/Projetos Pessoais/ZapIa"
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: javascript

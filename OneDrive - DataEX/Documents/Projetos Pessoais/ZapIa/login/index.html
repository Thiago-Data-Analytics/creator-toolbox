<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Entrar | MercaBot</title>
<meta name="robots" content="noindex,nofollow">
<meta name="description" content="Acesse sua conta MercaBot com link seguro por e-mail. Sem senha.">
<link rel="canonical" href="https://mercabot.com.br/login/">
<link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cabinet+Grotesk:wght@400;500;700;800&family=Clash+Display:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/login.css?v=20260416">
</head>
<body>
  <header class="topbar">
    <a class="logo" href="/">
      <svg class="logo-mark" viewBox="0 0 28 28" fill="none" aria-hidden="true" width="26" height="26"><path d="M5 0h18a5 5 0 0 1 5 5v14a5 5 0 0 1-5 5H12L6 28l2.5-4H5a5 5 0 0 1-5-5V5a5 5 0 0 1 5-5z" fill="#00e676"/><path d="M17 4L9 16h6l-5 8 13-10h-6z" fill="#050c07" opacity=".85"/></svg>
      <span class="logo-word">Merca<span>Bot</span></span>
    </a>
  </header>

  <main class="shell">
    <section class="card" aria-labelledby="loginTitle">
      <h1 id="loginTitle">Entrar na sua conta</h1>
      <p>Acesso sem senha. Informe seu e-mail e enviamos um link seguro — o mesmo e-mail traz também um código de 6 dígitos como alternativa.</p>
      <div class="status" id="authStatus" aria-live="polite" aria-atomic="true"></div>

      <form id="authForm" autocomplete="off" novalidate>
        <div class="field" id="emailField">
          <label class="label" for="authEmail">E-mail da conta</label>
          <input class="input" id="authEmail" type="email" autocomplete="email" inputmode="email" placeholder="voce@empresa.com.br" maxlength="254">
          <div class="field-error" id="authEmailError" aria-live="polite" aria-atomic="true">Informe um e-mail válido.</div>
        </div>

        <div class="field otp-field" id="otpField">
          <label class="label" for="authOtp">Código de acesso</label>
          <input class="input" id="authOtp" type="text" autocomplete="one-time-code" inputmode="numeric" maxlength="6" pattern="\d{6}" placeholder="000000">
          <div class="field-error" id="authOtpError" aria-live="polite" aria-atomic="true">Informe o código enviado por e-mail.</div>
        </div>

        <button class="btn" id="authBtn" type="submit">Enviar link de acesso</button>
        <button class="btn otp-submit-btn" id="otpBtn" type="button">Entrar com código</button>
      </form>

      <div class="actions" id="sessionActions">
        <a class="btn" id="openPanelBtn" href="/painel-cliente/app/?continue=1">Abrir painel</a>
        <button class="btn secondary" id="useAnotherAccountBtn" type="button">Entrar com outro e-mail</button>
      </div>
    </section>
  </main>

  <script src="/vendor/config.js"></script>
  <script src="/vendor/sentry.a82019f6.min.js"></script>
  <script src="/vendor/supabase.js"></script>
  <script src="/vendor/auth-utils.a5791307.min.js"></script>
  <script src="/assets/login.c5a406e5.min.js"></script>
</body>
</html>

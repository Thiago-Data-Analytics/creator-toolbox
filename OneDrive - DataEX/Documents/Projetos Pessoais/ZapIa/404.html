<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Página não encontrada — MercaBot</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cabinet+Grotesk:wght@400;700&family=Clash+Display:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/type.css">
<style>
:root{--green:#00e676;--bg:#080c09;--text:#eaf2eb;--muted:rgba(234,242,235,0.5);--border:rgba(234,242,235,0.07)}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Cabinet Grotesk',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:2rem}
.wrap{max-width:480px}
.code{font-family:'Clash Display',sans-serif;font-size:6rem;font-weight:700;color:rgba(0,230,118,.15);line-height:1;margin-bottom:1rem}
h1{font-family:'Clash Display',sans-serif;font-size:1.8rem;font-weight:700;letter-spacing:-.04em;margin-bottom:.75rem}
p{color:var(--muted);font-size:.95rem;line-height:1.7;margin-bottom:2rem}
.btn{background:var(--green);color:#080c09;border:none;padding:.875rem 2rem;border-radius:100px;font-family:'Cabinet Grotesk',sans-serif;font-weight:700;font-size:.95rem;text-decoration:none;display:inline-block;transition:all .2s}
.btn:hover{background:#fff}

:focus-visible{outline:3px solid rgba(0,230,118,.92);outline-offset:3px;border-radius:10px}
a:focus-visible,button:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible,[role='button']:focus-visible{box-shadow:0 0 0 4px rgba(0,230,118,.18)}
</style>

<link rel='stylesheet' href='/assets/whatsapp-sales.css'>
</head>
<body>
<div class="wrap">
  <div class="code">404</div>
  <h1>Página não encontrada</h1>
  <p>O link que você seguiu não existe ou foi movido. Volte para a página inicial e encontre o que precisa.</p>
  <a href="/" class="btn">Voltar ao início →</a>
</div>

<script src='/assets/whatsapp-sales.js' defer></script>
</body>
</html>

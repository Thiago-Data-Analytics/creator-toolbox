name: Deploy — MercaBot

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Lint & basic checks ──────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for leftover TODO markers in vendor files
        run: |
          if grep -r "TODO:" vendor/ --include="*.js" | grep -v "^Binary"; then
            echo "::error::Unresolved TODO found in vendor/"
            exit 1
          fi
          echo "✅ No unresolved TODOs"

      - name: Validate _headers syntax (no duplicate rules)
        run: |
          python3 -c "
          import sys
          routes = []
          for line in open('_headers'):
              line = line.strip()
              if line and not line.startswith(' ') and not line.startswith('#'):
                  if line in routes:
                      print(f'Duplicate route: {line}')
                      sys.exit(1)
                  routes.append(line)
          print('✅ _headers OK')
          "

      - name: Check no access_token or refresh_token in URL-building code
        run: |
          if grep -rn "access_token\|refresh_token" assets/ --include="*.js" | grep -v "//"; then
            echo "::warning::access_token/refresh_token reference found in assets/"
          fi
          echo "✅ Token-in-URL check passed"

      - name: Check unsafe-inline absent from critical CSP routes
        run: |
          python3 -c "
          import sys, re
          critical = ['/login', '/login/', '/acesso', '/acesso/', '/painel-cliente', '/painel-cliente/', '/painel-cliente/app', '/painel-cliente/app/']
          content = open('_headers').read()
          blocks = re.split(r'\n(?=\S)', content)
          for block in blocks:
              lines = block.strip().split('\n')
              if not lines: continue
              route = lines[0].strip()
              if route in critical:
                  for l in lines[1:]:
                      if 'script-src' in l and \"'unsafe-inline'\" in l:
                          print(f'FAIL: unsafe-inline in script-src on {route}')
                          sys.exit(1)
          print('✅ CSP unsafe-inline check passed')
          "

  # ── Deploy to Cloudflare Pages ───────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: lint
    # Only deploy on push to main, not on PRs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          projectName: mercabot
          directory: .
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch: main

  # ── Preview deploy for PRs ───────────────────────────────────────────────────
  preview:
    name: Preview
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Deploy preview to Cloudflare Pages
        id: preview_deploy
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          projectName: mercabot
          directory: .
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.head_ref }}

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 **Preview deployed:** ${{ steps.preview_deploy.outputs.url }}`
            })

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="mbwa-disabled" content="true">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1200px;height:630px;background:#080c09;font-family:system-ui,-apple-system,Arial,sans-serif;overflow:hidden;position:relative}
.grid{position:absolute;inset:0;background-image:linear-gradient(rgba(234,242,235,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(234,242,235,.04) 1px,transparent 1px);background-size:60px 60px}
.glow{position:absolute;inset:0;background:radial-gradient(ellipse 60% 60% at 50% 50%,rgba(0,230,118,.07),transparent)}
.content{position:relative;z-index:1;padding:165px 80px 0}
.logo-row{display:flex;align-items:center;gap:36px;margin-bottom:28px}
.icon{width:130px;height:130px;background:#00e676;border-radius:32px;display:flex;align-items:flex-end;justify-content:center;gap:10px;padding:16px 18px}
.bar{background:#080c09;border-radius:5px;width:18px}
.b1{height:50px}
.b2{height:70px}
.b3{height:87px}
.dot{position:absolute;width:22px;height:22px;background:#080c09;border-radius:50%;top:20px;right:20px}
.icon-wrap{position:relative}
.wordmark{font-size:90px;font-weight:700;letter-spacing:-4px;color:#eaf2eb;line-height:1}
.wordmark span{color:#00e676}
.tagline{font-size:26px;color:rgba(234,242,235,.55);margin-bottom:32px;letter-spacing:.5px}
.pills{display:flex;gap:16px}
.pill{padding:10px 28px;border-radius:22px;font-size:18px;font-weight:600}
.pill-green{background:rgba(0,230,118,.12);border:1px solid rgba(0,230,118,.3);color:#00e676}
.pill-gray{background:rgba(234,242,235,.06);border:1px solid rgba(234,242,235,.12);color:rgba(234,242,235,.7)}
.domain{position:absolute;bottom:28px;right:40px;font-size:20px;color:rgba(234,242,235,.3)}

:focus-visible{outline:3px solid rgba(0,230,118,.92);outline-offset:3px;border-radius:10px}
a:focus-visible,button:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible,[role='button']:focus-visible{box-shadow:0 0 0 4px rgba(0,230,118,.18)}
</style>

<link rel='stylesheet' href='/assets/whatsapp-sales.css'>
</head>
<body>
<div class="grid"></div>
<div class="glow"></div>
<div class="content">
  <div class="logo-row">
    <div class="icon-wrap">
      <div class="icon">
        <div class="bar b1"></div>
        <div class="bar b2"></div>
        <div class="bar b3"></div>
      </div>
      <div class="dot"></div>
    </div>
    <div class="wordmark">Merca<span>Bot</span></div>
  </div>
  <div class="tagline">Chatbot para WhatsApp com IA · Ativação guiada e operação clara</div>
  <div class="pills">
    <div class="pill pill-green">Ativação guiada</div>
    <div class="pill pill-gray">Cobrança validada no checkout</div>
    <div class="pill pill-gray">Configuração guiada</div>
  </div>
</div>
<div class="domain">mercabot.com.br</div>

<script src='/assets/whatsapp-sales.js' defer></script>
</body>
</html>

name = "mercabot-api"
main = "cloudflare-worker.js"
compatibility_date = "2024-09-23"

[observability]
enabled = true

[vars]
STRIPE_PRICE_STARTER_USD      = "price_1TIy7SPH0FzgtoJODvsHFKe5"
STRIPE_PRICE_PRO_USD          = "price_1TIyJ9PH0FzgtoJOcPVbMO3A"
STRIPE_PRICE_PARCEIRO_USD     = "price_1TIyJrPH0FzgtoJOaxjggoLL"
STRIPE_PRICE_STARTER_ANUAL_USD  = "price_1TIyKQPH0FzgtoJOtCNPH0TR"
STRIPE_PRICE_PRO_ANUAL_USD    = "price_1TIyL6PH0FzgtoJOZiOowU0X"
STRIPE_PRICE_PARCEIRO_ANUAL_USD = "price_1TIyLmPH0FzgtoJOIazGW4qT"

# 360Dialog (sandbox / dev) — sandbox vinculado ao número pessoal do founder.
# A API key fica em SECRET (npx wrangler secret put D360_SANDBOX_API_KEY), não aqui.
D360_ENABLED            = "true"
D360_MODE               = "dev"
D360_API_BASE_URL       = "https://waba-sandbox.360dialog.io"
D360_DEV_ALLOWED_SENDER = "553183834197"
D360_LAB_CUSTOMER_ID    = "1efd85c3-5b38-43fd-9fdf-373f38a14321"

# Gupshup BSP — scaffold (Fase 2.3). Deixar GUPSHUP_ENABLED=false ate
# aprovacao do programa ISV cair. Secrets (GUPSHUP_PARTNER_API_KEY,
# GUPSHUP_APP_API_KEY) ficam em wrangler secret put quando aprovar.
GUPSHUP_ENABLED             = "false"
GUPSHUP_MODE                = "dev"
GUPSHUP_API_BASE_URL        = "https://api.gupshup.io"
GUPSHUP_APP_NAME            = ""
GUPSHUP_SOURCE_PHONE        = ""
GUPSHUP_DEV_ALLOWED_SENDER  = "553183834197"
GUPSHUP_LAB_CUSTOMER_ID     = "1efd85c3-5b38-43fd-9fdf-373f38a14321"

# Cron triggers
# - "5 0 1 * *"  → reset mensal de cotas IA (dia 1, 00:05 UTC)
# - "0 7 1 * *"  → cálculo mensal de comissões de parceiros (dia 1, 07:00 UTC)
# - "5 6 * * 1"  → renovação tokens Meta + relatórios semanais (segunda, 06:05 UTC)
# - "5 10 * * *" → nudges/follow-ups/LGPD/cleanup (todo dia, 10:05 UTC)
[triggers]
crons = [
  "5 0 1 * *",
  "0 7 1 * *",
  "5 6 * * 1",
  "5 10 * * *",
]

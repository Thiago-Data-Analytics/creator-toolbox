<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin · MercaBot</title>
<meta name="robots" content="noindex,nofollow">
<meta name="mbwa-disabled" content="1">
<link href="https://fonts.googleapis.com/css2?family=Cabinet+Grotesk:wght@400;500;700;800&family=Clash+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
:root{--green:#00e676;--green-dim:rgba(0,230,118,.1);--green-border:rgba(0,230,118,.22);--bg:#080c09;--bg2:#0d120e;--bg3:#111810;--text:#eaf2eb;--muted:rgba(234,242,235,.78);--faint:rgba(234,242,235,.58);--border:rgba(234,242,235,.07);--red:#ef4444;--amber:#f59e0b;--blue:#3b82f6}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Cabinet Grotesk',sans-serif;font-size:16px;line-height:1.6;min-height:100vh;padding:2rem 1rem}
.wrap{max-width:1100px;margin:0 auto}
.title{font-family:'Clash Display',sans-serif;font-size:2rem;font-weight:700;letter-spacing:-.02em;margin-bottom:.25rem}
.title em{color:var(--green);font-style:normal}
.sub{color:var(--muted);font-size:.95rem;margin-bottom:2rem}
.row{display:flex;gap:.75rem;align-items:center;flex-wrap:wrap;margin-bottom:1.5rem}
.btn{background:var(--green);color:#080c09;border:none;border-radius:10px;padding:.55rem 1.1rem;font-weight:700;font-size:.9rem;cursor:pointer;font-family:inherit}
.btn-secondary{background:transparent;border:1px solid var(--border);color:var(--text)}
.status{font-size:.85rem;color:var(--muted)}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:.85rem;margin-bottom:2rem}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:1.1rem 1.2rem}
.card-label{font-size:.78rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:700;margin-bottom:.4rem}
.card-value{font-family:'Clash Display',sans-serif;font-size:2rem;font-weight:700;letter-spacing:-.02em;color:var(--text)}
.card-foot{font-size:.78rem;color:var(--faint);margin-top:.25rem}
.card.green{border-color:var(--green-border);background:linear-gradient(135deg,rgba(0,230,118,.06),var(--bg2))}
.card.green .card-value{color:var(--green)}
.card.red{border-color:rgba(239,68,68,.28);background:linear-gradient(135deg,rgba(239,68,68,.05),var(--bg2))}
.card.red .card-value{color:#fca5a5}
.card.amber{border-color:rgba(245,158,11,.28);background:linear-gradient(135deg,rgba(245,158,11,.05),var(--bg2))}
.card.amber .card-value{color:#fcd34d}
.section-title{font-family:'Clash Display',sans-serif;font-size:1.15rem;font-weight:700;margin:2rem 0 .8rem;letter-spacing:-.01em}
table{width:100%;border-collapse:collapse;background:var(--bg2);border:1px solid var(--border);border-radius:14px;overflow:hidden}
th,td{padding:.7rem 1rem;text-align:left;font-size:.92rem;border-bottom:1px solid var(--border)}
th{background:var(--bg3);font-weight:700;color:var(--muted);font-size:.78rem;text-transform:uppercase;letter-spacing:.05em}
tr:last-child td{border-bottom:none}
.warn{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.22);border-radius:12px;padding:1rem 1.2rem;color:#fcd34d;margin-bottom:1.5rem;font-size:.92rem}
.err{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.22);border-radius:12px;padding:1rem 1.2rem;color:#fca5a5;margin-bottom:1.5rem;font-size:.92rem}
.loading{padding:3rem;text-align:center;color:var(--muted)}
.muted{color:var(--muted)}
.bad{color:#fca5a5}
.ok{color:var(--green)}
.amber-text{color:#fcd34d}
a{color:var(--green);text-decoration:none}
a:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="wrap">
  <div class="title">Admin <em>MercaBot</em></div>
  <div class="sub">Visão de negócio em tempo real · acesso restrito ao e-mail admin</div>

  <div class="row">
    <button type="button" class="btn" id="refreshBtn">↻ Atualizar</button>
    <button type="button" class="btn btn-secondary" id="recoveryBtn">📧 Disparar recovery (dry-run)</button>
    <button type="button" class="btn btn-secondary" id="diagBtn">⚙️ Diagnostics</button>
    <span class="status" id="status">Carregando…</span>
  </div>

  <div id="content" class="loading">Verificando autenticação…</div>
</div>

<script src="/vendor/config.js"></script>
<script src="/vendor/sentry.a82019f6.min.js"></script>
<script src="/vendor/supabase.js"></script>
<script src="/vendor/auth-utils.a5791307.min.js"></script>
<script src="/admin/admin.js"></script>
</body>
</html>

<!DOCTYPE html><html><head><meta charset="UTF-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100vh;background:#080c09;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px}
</style></head><body>
<svg width="264" height="60" viewBox="0 0 264 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="lg1" x1="0" y1="0" x2="60" y2="60" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00e676"/>
      <stop offset="100%" stop-color="#00bfa5"/>
    </linearGradient>
    <radialGradient id="rg1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00e676" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#00e676" stop-opacity="0"/>
    </radialGradient>
    <filter id="f1"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <!-- Glow background -->
  <circle cx="30" cy="30" r="30" fill="url(#rg1)"/>

  <!-- Outer hexagon (pointy-top, r=25) -->
  <!-- Vertices: (30,5) (51.7,17.5) (51.7,42.5) (30,55) (8.3,42.5) (8.3,17.5) -->
  <polygon points="30,5 51.7,17.5 51.7,42.5 30,55 8.3,42.5 8.3,17.5"
           fill="none" stroke="url(#lg1)" stroke-width="1.2" stroke-opacity="0.6"/>

  <!-- Inner hexagon (r=13) -->
  <polygon points="30,17 41.3,23.5 41.3,36.5 30,43 18.7,36.5 18.7,23.5"
           fill="none" stroke="#00e676" stroke-width="1" stroke-opacity="0.35"/>

  <!-- Spokes outer→inner (only alternating 3) -->
  <line x1="30" y1="5"    x2="30"  y2="17"   stroke="#00e676" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="51.7" y1="42.5" x2="41.3" y2="36.5" stroke="#00e676" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="8.3" y1="42.5"  x2="18.7" y2="36.5" stroke="#00e676" stroke-width="1" stroke-opacity="0.5"/>

  <!-- Outer vertex dots -->
  <circle cx="30"   cy="5"    r="2.2" fill="#00e676" filter="url(#f1)"/>
  <circle cx="51.7" cy="17.5" r="2.2" fill="#00e676" fill-opacity="0.6"/>
  <circle cx="51.7" cy="42.5" r="2.2" fill="#00e676" fill-opacity="0.6"/>
  <circle cx="30"   cy="55"   r="2.2" fill="#00e676" fill-opacity="0.4"/>
  <circle cx="8.3"  cy="42.5" r="2.2" fill="#00e676" fill-opacity="0.6"/>
  <circle cx="8.3"  cy="17.5" r="2.2" fill="#00e676" fill-opacity="0.6"/>

  <!-- Center core -->
  <circle cx="30" cy="30" r="5" fill="url(#lg1)" filter="url(#f1)"/>
  <circle cx="30" cy="30" r="2.5" fill="#eaf2eb"/>

  <!-- Wordmark -->
  <text x="72" y="38" font-family="'Segoe UI',system-ui,sans-serif" font-weight="500" font-size="24" letter-spacing="-0.3" fill="#ddeee0">Merca</text><text x="155" y="38" font-family="'Segoe UI',system-ui,sans-serif" font-weight="700" font-size="24" letter-spacing="-0.3" fill="#00e676">Bot</text>
</svg>
<p style="font-family:system-ui;font-size:9px;letter-spacing:4px;color:rgba(234,242,235,.16);text-transform:uppercase;font-weight:500">Neural Hexagon</p>
</body></html>

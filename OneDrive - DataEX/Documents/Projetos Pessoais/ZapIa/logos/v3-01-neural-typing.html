<!DOCTYPE html><html><head><meta charset="UTF-8"><style>*{margin:0;padding:0;box-sizing:border-box}html,body{width:100%;height:100vh;background:#080c09;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px}</style></head><body>
<svg width="282" height="68" viewBox="0 0 282 68" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg1" x1="3" y1="3" x2="57" y2="53" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00e676"/>
      <stop offset="100%" stop-color="#009e4f"/>
    </linearGradient>
    <filter id="gw1"><feGaussianBlur stdDeviation="2.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="gw2"><feGaussianBlur stdDeviation="1.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <!-- Chat bubble (WhatsApp style) with tail bottom-left -->
  <path d="M 15,3 H 45 A 12,12 0 0 1 57,15 V 37 A 12,12 0 0 1 45,49 H 22 L 9,65 L 19,49 H 15 A 12,12 0 0 1 3,37 V 15 A 12,12 0 0 1 15,3 Z" fill="url(#bg1)"/>

  <!-- NEURAL TYPING: 3 dots as neural nodes forming a triangle, like WhatsApp "..." → AI synapses -->
  <!-- Connecting lines (behind dots) -->
  <line x1="20" y1="30" x2="30" y2="20" stroke="white" stroke-width="1.1" stroke-opacity="0.6"/>
  <line x1="40" y1="30" x2="30" y2="20" stroke="white" stroke-width="1.1" stroke-opacity="0.6"/>
  <line x1="20" y1="30" x2="40" y2="30" stroke="white" stroke-width="1.1" stroke-opacity="0.45"/>
  <!-- Small midpoint pulses on lines -->
  <circle cx="25" cy="25" r="1.2" fill="white" fill-opacity="0.5"/>
  <circle cx="35" cy="25" r="1.2" fill="white" fill-opacity="0.5"/>
  <circle cx="30" cy="30" r="1.2" fill="white" fill-opacity="0.45"/>

  <!-- Bottom-left dot -->
  <circle cx="20" cy="30" r="4.5" fill="white" fill-opacity="0.85"/>
  <circle cx="20" cy="30" r="2.2" fill="white"/>
  <!-- Bottom-right dot -->
  <circle cx="40" cy="30" r="4.5" fill="white" fill-opacity="0.85"/>
  <circle cx="40" cy="30" r="2.2" fill="white"/>
  <!-- Top center dot (brighter — the "active" node) -->
  <circle cx="30" cy="20" r="5.5" fill="white" filter="url(#gw1)"/>
  <circle cx="30" cy="20" r="3.2" fill="white"/>
  <circle cx="30" cy="20" r="1.4" fill="#00e676"/>

  <!-- Wordmark -->
  <text x="72" y="37" font-family="'Segoe UI',system-ui,sans-serif" font-weight="400" font-size="25" letter-spacing="-0.4" fill="#d6ead9">Merca</text><text x="158" y="37" font-family="'Segoe UI',system-ui,sans-serif" font-weight="700" font-size="25" letter-spacing="-0.4" fill="#00e676">Bot</text>
  <text x="72" y="52" font-family="'Segoe UI',system-ui,sans-serif" font-weight="400" font-size="9.5" letter-spacing="2.8" fill="rgba(234,242,235,0.3)">IA · WHATSAPP BUSINESS</text>
</svg>
<p style="font-family:system-ui;font-size:9px;letter-spacing:4px;color:rgba(234,242,235,.14);text-transform:uppercase;font-weight:500">01 · Neural Typing</p>
</body></html>

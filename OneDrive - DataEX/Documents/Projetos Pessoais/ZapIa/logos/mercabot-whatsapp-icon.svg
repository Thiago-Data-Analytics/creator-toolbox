<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="wz-bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0faf4"/>
    </linearGradient>
    <linearGradient id="wz-bubble" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1aff8c"/>
      <stop offset="100%" stop-color="#00b359"/>
    </linearGradient>
    <filter id="wz-sh" x="-8%" y="-8%" width="116%" height="116%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10" result="blur"/>
      <feFlood flood-color="#00c060" flood-opacity="0.35" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="wz-bolt-sh" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5" result="blur"/>
      <feFlood flood-color="#000" flood-opacity="0.18" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- White circular background -->
  <circle cx="256" cy="256" r="256" fill="url(#wz-bg)"/>

  <!-- Chat bubble — centered, generous padding from circle edge -->
  <path d="M92 60h328a60 60 0 0 1 60 60v200a60 60 0 0 1-60 60H200L104 452l32-72H92A60 60 0 0 1 32 320V120A60 60 0 0 1 92 60z"
        fill="url(#wz-bubble)" filter="url(#wz-sh)"/>

  <!-- Lightning bolt — centered inside bubble -->
  <path d="M302 88L190 262h88l-72 162 196-194H298z"
        fill="#050c07" opacity=".80" filter="url(#wz-bolt-sh)"/>
</svg>
